name: Build Windows app

on:
  push:
    branches: [main]
  workflow_dispatch:

jobs:
  test-and-build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Verify Tkinter runtime
        run: >
          python -c "import tkinter as tk; root = tk.Tk(); root.destroy(); print('Tkinter OK')"

      - name: Install packager
        run: python -m pip install --upgrade pip pyinstaller

      - name: Build Windows application
        run: >
          python -m PyInstaller --noconfirm --clean --windowed
          --name BlogDraftAgent app.py

      - name: Upload Windows application
        uses: actions/upload-artifact@v4
        with:
          name: BlogDraftAgent-windows
          path: dist/BlogDraftAgent
          if-no-files-found: error
