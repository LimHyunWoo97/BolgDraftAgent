name: Test, build and release Windows app

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: write

jobs:
  test-and-build:
    runs-on: windows-latest

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run tests
        run: python -m unittest discover -s tests

      - name: Verify Tkinter runtime
        run: >
          python -c "import tkinter as tk; root = tk.Tk(); root.destroy(); print('Tkinter OK')"

      - name: Install packager
        run: python -m pip install --upgrade pip pyinstaller -r requirements.txt

      - name: Build Windows application
        run: >
          python -m PyInstaller --noconfirm --clean --windowed
          --name BlogDraftAgent --icon assets\blog-draft-agent-logo.ico
          --add-data "assets\blog-draft-agent-logo.ico;assets" app.py

      - name: Package release ZIP
        run: >
          Compress-Archive -Path dist\BlogDraftAgent\*
          -DestinationPath dist\BlogDraftAgent-windows-x64.zip -Force

      - name: Upload Windows application
        uses: actions/upload-artifact@v4
        with:
          name: BlogDraftAgent-windows
          path: dist/BlogDraftAgent-windows-x64.zip
          if-no-files-found: error

      - name: Create GitHub Release
        if: startsWith(github.ref, 'refs/tags/v')
        env:
          GH_TOKEN: ${{ github.token }}
        run: >
          gh release create "${{ github.ref_name }}" dist\BlogDraftAgent-windows-x64.zip
          --title "Blog Draft Agent ${{ github.ref_name }}"
          --generate-notes
